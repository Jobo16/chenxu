name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/ruff-action@v3
        with:
          args: check app/src --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          args: format app/src --check
