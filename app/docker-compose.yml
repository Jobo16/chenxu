# 晨序 — Mac / Linux self-hosted quickstart
# Usage:
#   1. cp .env.example .env && fill in .env
#   2. docker compose up -d
#   3. Visit http://localhost:3000/dashboard

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: morgenruf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-morgenruf}
      POSTGRES_DB: morgenruf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morgenruf"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: morgenruf/morgenruf:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://morgenruf:${DB_PASSWORD:-morgenruf}@db:5432/morgenruf
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DASHBOARD_AUTH: ${DASHBOARD_AUTH:-none}
      DASHBOARD_ADMIN_KEY: ${DASHBOARD_ADMIN_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_EVENT_MODE: ${FEISHU_EVENT_MODE:-ws}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_TEAM_ID: ${FEISHU_TEAM_ID:-feishu}
      FEISHU_TEAM_NAME: ${FEISHU_TEAM_NAME:-飞书工作区}
      FEISHU_DEFAULT_CHAT_ID: ${FEISHU_DEFAULT_CHAT_ID:-}
      FEISHU_DEFAULT_CHAT_NAME: ${FEISHU_DEFAULT_CHAT_NAME:-进度群}
      FEISHU_CHANNELS: ${FEISHU_CHANNELS:-}
      FEISHU_ADMIN_OPEN_ID: ${FEISHU_ADMIN_OPEN_ID:-}
      FEISHU_STANDUP_MEMBERS: ${FEISHU_STANDUP_MEMBERS:-}
      FEISHU_SCHEDULE_TIME: ${FEISHU_SCHEDULE_TIME:-09:30}
      FEISHU_SCHEDULE_TZ: ${FEISHU_SCHEDULE_TZ:-Asia/Shanghai}
      FEISHU_SCHEDULE_DAYS: ${FEISHU_SCHEDULE_DAYS:-mon,tue,wed,thu,fri}
      FEISHU_QUESTIONS_JSON: ${FEISHU_QUESTIONS_JSON:-}
      FEISHU_AI_SUMMARY_ENABLED: ${FEISHU_AI_SUMMARY_ENABLED:-false}
      FEISHU_AI_PROVIDER: ${FEISHU_AI_PROVIDER:-deepseek}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
