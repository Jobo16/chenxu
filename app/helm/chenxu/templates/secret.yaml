apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chenxu.fullname" . }}-secret
  labels:
    {{- include "chenxu.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "chenxu.fullname" .) .Values.postgresql.auth.database | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- end }}
  FLASK_SECRET_KEY: {{ .Values.flaskSecretKey | quote }}
  RESEND_API_KEY: {{ .Values.resend.apiKey | quote }}
  APP_URL: {{ .Values.app.url | quote }}
  PORT: {{ .Values.app.port | quote }}
  DASHBOARD_AUTH: {{ .Values.dashboard.auth | quote }}
  DASHBOARD_ADMIN_KEY: {{ .Values.dashboard.adminKey | quote }}
  FEISHU_EVENT_MODE: {{ .Values.feishu.eventMode | quote }}
  FEISHU_APP_ID: {{ .Values.feishu.appId | quote }}
  FEISHU_APP_SECRET: {{ .Values.feishu.appSecret | quote }}
  FEISHU_VERIFICATION_TOKEN: {{ .Values.feishu.verificationToken | quote }}
  FEISHU_TEAM_ID: {{ .Values.feishu.teamId | quote }}
  FEISHU_TEAM_NAME: {{ .Values.feishu.teamName | quote }}
  FEISHU_DEFAULT_CHAT_ID: {{ .Values.feishu.defaultChatId | quote }}
  FEISHU_DEFAULT_CHAT_NAME: {{ .Values.feishu.defaultChatName | quote }}
  FEISHU_CHANNELS: {{ .Values.feishu.channels | quote }}
  FEISHU_ADMIN_OPEN_ID: {{ .Values.feishu.adminOpenId | quote }}
  FEISHU_STANDUP_MEMBERS: {{ .Values.feishu.standupMembers | quote }}
  FEISHU_SCHEDULE_TIME: {{ .Values.feishu.scheduleTime | quote }}
  FEISHU_SCHEDULE_TZ: {{ .Values.feishu.scheduleTz | quote }}
  FEISHU_SCHEDULE_DAYS: {{ .Values.feishu.scheduleDays | quote }}
  FEISHU_QUESTIONS_JSON: {{ .Values.feishu.questionsJson | quote }}
  FEISHU_AI_SUMMARY_ENABLED: {{ .Values.feishu.aiSummaryEnabled | quote }}
  FEISHU_AI_PROVIDER: {{ .Values.feishu.aiProvider | quote }}
  OPENAI_API_KEY: {{ .Values.ai.openaiApiKey | quote }}
  DEEPSEEK_API_KEY: {{ .Values.ai.deepseekApiKey | quote }}
  DEEPSEEK_BASE_URL: {{ .Values.ai.deepseekBaseUrl | quote }}
  DEEPSEEK_MODEL: {{ .Values.ai.deepseekModel | quote }}
  ANTHROPIC_API_KEY: {{ .Values.ai.anthropicApiKey | quote }}
  SENTRY_DSN: {{ .Values.sentry.dsn | quote }}
  SENTRY_ENV: {{ .Values.sentry.env | quote }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s-redis:6379/0" (include "chenxu.fullname" .) | quote }}
  {{- else }}
  REDIS_URL: {{ .Values.externalRedis.url | quote }}
  {{- end }}
