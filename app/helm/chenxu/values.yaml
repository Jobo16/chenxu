replicaCount: 1

image:
  repository: ghcr.io/jobo16/chenxu
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: chenxu.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: chenxu-tls
      hosts:
        - chenxu.example.com

app:
  url: "https://chenxu.example.com"
  port: "3000"

dashboard:
  auth: "key"
  adminKey: ""

feishu:
  eventMode: "ws"
  appId: ""
  appSecret: ""
  verificationToken: ""
  teamId: "feishu"
  teamName: "飞书工作区"
  defaultChatId: ""
  defaultChatName: "进度群"
  channels: ""
  adminOpenId: ""
  standupMembers: ""
  scheduleTime: "09:30"
  scheduleTz: "Asia/Shanghai"
  scheduleDays: "mon,tue,wed,thu,fri"
  questionsJson: ""
  aiSummaryEnabled: "false"
  aiProvider: "deepseek"

ai:
  openaiApiKey: ""
  deepseekApiKey: ""
  deepseekBaseUrl: "https://api.deepseek.com"
  deepseekModel: "deepseek-chat"
  anthropicApiKey: ""

postgresql:
  enabled: false
  auth:
    username: chenxu
    password: ""
    database: chenxu
  primary:
    persistence:
      enabled: true
      size: 5Gi
  image:
    registry: registry-1.docker.io
    repository: bitnami/postgresql
    tag: "16"

externalDatabase:
  url: ""

flaskSecretKey: ""

resend:
  apiKey: ""

redis:
  enabled: true
  image:
    repository: redis
    tag: "8"
    pullPolicy: IfNotPresent
  maxmemory: "128mb"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

externalRedis:
  url: ""

sentry:
  dsn: ""
  env: "production"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

teamsConfig: ""
